<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Trend bars interaction
            const bars = document.querySelectorAll('.group');
            bars.forEach(bar => {
                bar.addEventListener('click', () => {
                    bars.forEach(b => {
                        const inner = b.querySelector('div');
                        if (inner) inner.classList.replace('bg-primary-container', 'bg-primary-container/40');
                        const label = b.querySelector('span');
                        if (label) label.classList.remove('font-bold');
                    });
                    const targetInner = bar.querySelector('div');
                    if (targetInner) targetInner.classList.replace('bg-primary-container/40', 'bg-primary-container');
                    const targetLabel = bar.querySelector('span');
                    if (targetLabel) targetLabel.classList.add('font-bold');
                });
            });
        });
    </script>
