<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>

<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>

                        "inverse-on-surface": "#e5f6dd",

                        "secondary": "#556252",
                        "on-background": "#111f10",
                        "tertiary-fixed": "#7cf6ec",
                        "surface-tint": "#2e6c00",
                        "secondary-fixed-dim": "#bccbb7",
                        "inverse-primary": "#8eda5f",

                        "surface-container": "#e2f3da",

                    "borderRadius": {

<style>
        body { font-family: 'Hanken Grotesk', sans-serif; -webkit-tap-highlight-color: transparent; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .active-category { 
            border-color: #2e6c00 !important; 
            background-color: #a9f778 !important;
            box-shadow: 0 4px 12px rgba(46, 108, 0, 0.1);
        }
        .keypad-button:active { transform: scale(0.95); background-color: #dcedd5; }
        .sheet-shadow { box-shadow: 0 -8px 32px rgba(46, 108, 0, 0.12); }
        .scroll-hide::-webkit-scrollbar { display: none; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .cursor-blink { animation: blink 1s step-end infinite; }
        @keyframes blink { from, to { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body class="bg-bg-light text-on-background min-h-screen overflow-hidden">
<!-- Background Content (Blurred Home Dashboard) -->
<div class="fixed inset-0 z-0 opacity-40 blur-sm pointer-events-none">
<header class="flex justify-between items-center p-container-margin h-touch-target">
<span class="material-symbols-outlined text-primary">calendar_today</span>
<h1 class="font-headline-lg text-primary font-bold">4月</h1>
<span class="material-symbols-outlined text-on-surface-variant">settings</span>
</header>
<div class="px-container-margin space-y-6">
<div class="h-32 w-full bg-surface-container rounded-2xl"></div>
<div class="h-48 w-full bg-surface-container-low rounded-2xl"></div>
<div class="space-y-4">
<div class="h-16 w-full bg-surface-container-lowest rounded-xl"></div>
<div class="h-16 w-full bg-surface-container-lowest rounded-xl"></div>
</div>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 bg-on-background/20 backdrop-blur-[2px] z-40" onclick="window.location.href='{{DATA:SCREEN:SCREEN_10}}'"></div>
<!-- Bottom Sheet Modal -->
<div class="fixed inset-x-0 bottom-0 z-50 flex flex-col max-h-[92vh] bg-white rounded-t-[32px] animate-slide-up sheet-shadow overflow-hidden">
<!-- Handle & Header -->
<div class="flex flex-col items-center">
<div class="w-10 h-1 bg-outline-variant rounded-full mt-3 mb-1"></div>
<div class="w-full px-container-margin py-2 flex items-center justify-between">
<button class="w-touch-target h-touch-target flex items-center justify-center text-on-surface-variant rounded-full active:bg-surface-container-low transition-colors" onclick="window.location.href='{{DATA:SCREEN:SCREEN_10}}'">
<span class="material-symbols-outlined">close</span>
</button>
<h2 class="font-headline-md text-on-surface" id="record-panel">记一笔</h2>
<div class="w-touch-target h-touch-target"></div>
</div>
</div>
<!-- Content Area -->
<div class="flex-1 overflow-y-auto scroll-hide px-container-margin pb-32">
<!-- Amount Display -->
<div class="py-6 flex flex-col items-center">
<div class="text-on-surface-variant font-label-sm mb-2">输入金额</div>
<div class="flex items-center space-x-1">
<span class="text-headline-lg text-primary font-bold">¥</span>
<div class="flex items-center">
<span class="text-display-amount-mobile md:text-display-amount font-bold text-on-background" id="amount-display">0</span>
<div class="w-[2px] h-8 bg-primary cursor-blink ml-1"></div>
</div>
</div>
</div>
<!-- Category Selector (Grid) -->
<div class="grid grid-cols-4 gap-y-6 gap-x-gutter mb-8">
<!-- Food -->
<button class="category-btn flex flex-col items-center gap-2 group transition-all" data-cat="餐饮">
<div class="w-14 h-14 rounded-full bg-surface-container-low flex items-center justify-center text-2xl transition-all border-2 border-transparent active-category">
                        🍚
                    </div>
<span class="font-label-sm text-on-surface-variant">餐饮</span>
</button>
<!-- Transport -->
<button class="category-btn flex flex-col items-center gap-2 group transition-all" data-cat="交通">
<div class="w-14 h-14 rounded-full bg-surface-container-low flex items-center justify-center text-2xl transition-all border-2 border-transparent">
                        🚗
                    </div>
<span class="font-label-sm text-on-surface-variant">交通</span>
</button>
<!-- Shopping -->
<button class="category-btn flex flex-col items-center gap-2 group transition-all" data-cat="购物">
<div class="w-14 h-14 rounded-full bg-surface-container-low flex items-center justify-center text-2xl transition-all border-2 border-transparent">
                        🛒
                    </div>
<span class="font-label-sm text-on-surface-variant">购物</span>
</button>
<!-- Housing -->
<button class="category-btn flex flex-col items-center gap-2 group transition-all" data-cat="居住">
<div class="w-14 h-14 rounded-full bg-surface-container-low flex items-center justify-center text-2xl transition-all border-2 border-transparent">
                        🏠
                    </div>
<span class="font-label-sm text-on-surface-variant">居住</span>
</button>
<!-- Entertainment -->
<button class="category-btn flex flex-col items-center gap-2 group transition-all" data-cat="娱乐">
<div class="w-14 h-14 rounded-full bg-surface-container-low flex items-center justify-center text-2xl transition-all border-2 border-transparent">
                        🎬
                    </div>
<span class="font-label-sm text-on-surface-variant">娱乐</span>
</button>
<!-- Medical -->
<button class="category-btn flex flex-col items-center gap-2 group transition-all" data-cat="医疗">
<div class="w-14 h-14 rounded-full bg-surface-container-low flex items-center justify-center text-2xl transition-all border-2 border-transparent">
                        💊
                    </div>
<span class="font-label-sm text-on-surface-variant">医疗</span>
</button>
<!-- Education -->
<button class="category-btn flex flex-col items-center gap-2 group transition-all" data-cat="教育">
<div class="w-14 h-14 rounded-full bg-surface-container-low flex items-center justify-center text-2xl transition-all border-2 border-transparent">
                        📚
                    </div>
<span class="font-label-sm text-on-surface-variant">教育</span>
</button>
<!-- Others -->
<button class="category-btn flex flex-col items-center gap-2 group transition-all" data-cat="其他">
<div class="w-14 h-14 rounded-full bg-surface-container-low flex items-center justify-center text-2xl transition-all border-2 border-transparent">
                        📦
                    </div>
<span class="font-label-sm text-on-surface-variant">其他</span>
</button>
</div>
<!-- Metadata Inputs -->
<div class="space-y-3 mb-8">
<div class="flex items-center space-x-3 bg-surface-container-low rounded-2xl px-4 py-3.5 group focus-within:bg-white focus-within:ring-2 focus-within:ring-primary/20 transition-all">
<span class="material-symbols-outlined text-primary text-[22px]">event</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface font-body-md w-full p-0" readonly="" type="text" value="今天 (2026-04-22)"/>
</div>
<div class="flex items-center space-x-3 bg-surface-container-low rounded-2xl px-4 py-3.5 group focus-within:bg-white focus-within:ring-2 focus-within:ring-primary/20 transition-all">
<span class="material-symbols-outlined text-primary text-[22px]">notes</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface font-body-md w-full p-0 placeholder:text-outline" placeholder="添加备注..." type="text"/>
</div>
</div>
<!-- Number Keypad -->
<div class="grid grid-cols-4 gap-3 mb-4">
<button class="keypad-button h-14 bg-surface-container-low rounded-2xl font-headline-md text-on-surface" onclick="appendNum('1')">1</button>
<button class="keypad-button h-14 bg-surface-container-low rounded-2xl font-headline-md text-on-surface" onclick="appendNum('2')">2</button>
<button class="keypad-button h-14 bg-surface-container-low rounded-2xl font-headline-md text-on-surface" onclick="appendNum('3')">3</button>
<button class="keypad-button h-14 bg-secondary-container rounded-2xl text-on-secondary-container flex items-center justify-center" onclick="deleteNum()">
<span class="material-symbols-outlined">backspace</span>
</button>
<button class="keypad-button h-14 bg-surface-container-low rounded-2xl font-headline-md text-on-surface" onclick="appendNum('4')">4</button>
<button class="keypad-button h-14 bg-surface-container-low rounded-2xl font-headline-md text-on-surface" onclick="appendNum('5')">5</button>
<button class="keypad-button h-14 bg-surface-container-low rounded-2xl font-headline-md text-on-surface" onclick="appendNum('6')">6</button>
<button class="keypad-button h-14 bg-secondary-container rounded-2xl font-body-lg text-on-secondary-container" onclick="clearNum()">C</button>
<button class="keypad-button h-14 bg-surface-container-low rounded-2xl font-headline-md text-on-surface" onclick="appendNum('7')">7</button>
<button class="keypad-button h-14 bg-surface-container-low rounded-2xl font-headline-md text-on-surface" onclick="appendNum('8')">8</button>
<button class="keypad-button h-14 bg-surface-container-low rounded-2xl font-headline-md text-on-surface" onclick="appendNum('9')">9</button>
<button class="keypad-button h-14 bg-primary text-on-primary rounded-2xl row-span-2 flex flex-col items-center justify-center font-headline-md active:bg-primary-container active:text-on-primary-container" onclick="saveTransaction()">
<span class="text-sm font-medium mb-1">OK</span>
<span class="material-symbols-outlined">done</span>
</button>
<button class="keypad-button h-14 bg-surface-container-low rounded-2xl font-headline-md text-on-surface" onclick="appendNum('.')">.</button>
<button class="keypad-button h-14 bg-surface-container-low rounded-2xl font-headline-md text-on-surface col-span-2" onclick="appendNum('0')">0</button>
</div>
</div>
<!-- Persistent Bottom Action -->
<div class="p-container-margin bg-white border-t border-outline-variant/10">
<button class="w-full h-14 bg-primary text-on-primary font-headline-md rounded-full shadow-lg active:scale-[0.98] transition-all duration-200" onclick="saveTransaction()">
                确认并保存
            </button>
</div>
</div>
<script>
        // Keyboard Interactive Logic
        let currentAmount = "0";
        const display = document.getElementById('amount-display');

        function appendNum(val) {
            if (currentAmount === "0") {
                if (val === ".") {
                    currentAmount = "0.";
                } else {
                    currentAmount = val;
                }
            } else {
                if (val === "." && currentAmount.includes(".")) return;
                // Limit decimals to 2 places
                if (currentAmount.includes(".") && currentAmount.split(".")[1].length >= 2) return;
                // Limit overall length
                if (currentAmount.length > 10) return;
                currentAmount += val;
            }
            updateDisplay();
        }

        function deleteNum() {
            if (currentAmount.length === 1) {
                currentAmount = "0";
            } else {
                currentAmount = currentAmount.slice(0, -1);
            }
            updateDisplay();
        }

        function clearNum() {
            currentAmount = "0";
            updateDisplay();
        }

        function updateDisplay() {
            display.innerText = currentAmount;
            // Visual feedback - simple pulse
            display.style.transform = 'scale(1.05)';
            setTimeout(() => display.style.transform = 'scale(1)', 50);
        }

        // Category Selection UI
        const catButtons = document.querySelectorAll('.category-btn');
        catButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                catButtons.forEach(b => b.querySelector('div').classList.remove('active-category'));
                btn.querySelector('div').classList.add('active-category');
                
                // Add a small scale effect
                btn.style.transform = 'scale(0.95)';
                setTimeout(() => btn.style.transform = 'scale(1)', 100);
            });
        });

        // Navigation Back
        function saveTransaction() {
            if (currentAmount === "0") {
                alert('请输入金额');
                return;
            }
            // Success animation or feedback could go here
            window.location.href = "{{DATA:SCREEN:SCREEN_10}}";
        }

        // Handle native touch feedback
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('touchstart', () => {
                button.style.opacity = '0.8';
            });
            button.addEventListener('touchend', () => {
                button.style.opacity = '1';
            });
        });
    </script>
</body></html>
