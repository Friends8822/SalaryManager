<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center px-container-margin relative overflow-hidden">
<!-- Atmospheric Background Decoration -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary-fixed/20 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute -bottom-24 -left-24 w-80 h-80 bg-secondary-container/30 rounded-full blur-3xl pointer-events-none"></div>
<!-- Login Container -->
<main class="w-full max-w-sm flex flex-col items-center z-10">
<!-- Brand Identity -->
<header class="text-center mb-10">
<div class="w-20 h-20 bg-primary-container rounded-full flex items-center justify-center mb-6 mx-auto sprout-float shadow-sm border border-primary/10">
<span class="material-symbols-outlined text-on-primary-container text-[40px]" data-icon="sprint">sprint</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2 tracking-tight">login</h1>
<p class="font-body-md text-body-md text-on-surface-variant">欢迎回来，开启清新理财的一天</p>
</header>
<!-- Form Section -->
<div class="w-full space-y-6">
<!-- Username Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-primary uppercase tracking-widest pl-1" for="username">用户名</label>
<div class="relative group input-focus-ring rounded-xl bg-surface-container-low transition-all duration-300">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="person">person</span>
<input class="w-full h-touch-target bg-transparent border-none focus:ring-0 pl-12 pr-4 font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="username" placeholder="输入您的用户名" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-end pl-1 pr-1">
<label class="font-label-sm text-label-sm text-primary uppercase tracking-widest" for="password">密码</label>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors active:scale-95" href="#" onclick="alert('重置密码功能暂未开放'); return false;">忘记密码？</a>
</div>
<div class="relative group input-focus-ring rounded-xl bg-surface-container-low transition-all duration-300">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full h-touch-target bg-transparent border-none focus:ring-0 pl-12 pr-12 font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="password" placeholder="输入您的密码" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors active:scale-95" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="eye-icon">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full h-touch-target bg-primary text-on-primary font-headline-md text-headline-md rounded-full shadow-lg shadow-primary/20 active:scale-95 transition-all duration-200 flex items-center justify-center gap-2 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-transform" onclick="window.location.href='dashboard'">
                立即登录
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
<!-- Biometric Alternative -->
<div class="mt-8 flex flex-col items-center gap-4">
<p class="font-label-sm text-label-sm text-outline-variant">或使用指纹/面容快速登录</p>
<button class="w-12 h-12 rounded-full bg-surface-container border border-outline-variant/30 flex items-center justify-center text-primary transition-transform active:scale-95 duration-200" onclick="alert('正在启动面容/指纹识别...');">
<span class="material-symbols-outlined text-[28px]">fingerprint</span>
</button>

            还没有账号？

</div>
<script>
    function togglePassword() {
        const input = document.getElementById('password');
        const icon = document.getElementById('eye-icon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.innerText = 'visibility_off';
        } else {
            input.type = 'password';
            icon.innerText = 'visibility';
        }
    }
</script>
