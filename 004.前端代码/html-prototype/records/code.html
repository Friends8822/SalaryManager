<script>
        // Micro-interactions for Record Items
        document.querySelectorAll('.record-item').forEach(item => {
            let startX;
            const content = item.querySelector('.swipe-action');
            
            item.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
            }, {passive: true});

            item.addEventListener('touchmove', (e) => {
                let currentX = e.touches[0].clientX;
                let diff = startX - currentX;
                if (diff > 0 && diff < 120) {
                    content.style.transform = `translateX(-${diff}px)`;
                }
            }, {passive: true});

            item.addEventListener('touchend', (e) => {
                let endX = e.changedTouches[0].clientX;
                if (startX - endX > 60) {
                    content.style.transform = `translateX(-64px)`;
                } else {
                    content.style.transform = `translateX(0px)`;
                }
            });
            
            item.addEventListener('click', () => {
                document.querySelectorAll('.swipe-action').forEach(el => {
                    if (el !== content) el.style.transform = 'translateX(0px)';
                });
            });
        });

        // Filter chips active state
        const chips = document.querySelectorAll('nav button');
        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                chips.forEach(c => {
                    c.classList.remove('bg-primary', 'text-on-primary');
                    c.classList.add('bg-surface-container-high', 'text-on-surface-variant');
                });
                chip.classList.remove('bg-surface-container-high', 'text-on-surface-variant');
                chip.classList.add('bg-primary', 'text-on-primary');
            });
        });
    </script>
